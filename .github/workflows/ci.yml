name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build/repositories
            .build/checkouts
            .build/artifacts
            .build/plugins
          key: ${{ runner.os }}-${{ runner.arch }}-swift-knowledge-graph-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-knowledge-graph-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Test package
        run: swift test
